layers:
  - id: L1
    name: hard_facts
    precedence: 100
    scope: global
  - id: L2
    name: author_intent
    precedence: 80
    scope: book
  - id: L3
    name: planning
    precedence: 60
    scope: arc
  - id: L4
    name: current_task
    precedence: 70
    scope: local
sections:
  hard:
    - story_frame
    - current_state
    - book_rules
    - roles
  soft:
    - author_intent
    - current_focus
    - volume_map
  diagnostic:
    - anti_ai_checks
    - continuity_audit
    - style_regression_checks
overrideEdges:
  - from: L4
    to: L3
    allowed: true
    scope: current_chapter
  - from: L4
    to: L2
    allowed: false
    scope: current_chapter
  - from: L4
    to: L1
    allowed: false
    scope: current_chapter
activeOverrides:
  - from: L4
    to: L3
    target: chapter:2/mustAvoid
    reason: 禁止“恰好赶到”型情节——任何解围行动必须付出前置代价
  - from: L4
    to: L3
    target: chapter:2/mustAvoid
    reason: 禁止伪警察集体降智——佐佐木的整个情报链条必须可靠，失误只能来自信息不对称而非敌人犯蠢
  - from: L4
    to: L3
    target: chapter:2/mustAvoid
    reason: 禁止民间故事作为一种“神秘力量”影响现实——民间故事是隐喻、是密码、是文化记录，它们本身没有超自然力量
  - from: L4
    to: L3
    target: chapter:2/mustAvoid
    reason: 禁止主角在极端寒冷条件下做超出生理极限的事（如赤手在雪中长跑、单衣出门）——极寒是铁律
  - from: L4
    to: L3
    target: chapter:2/mustAvoid
    reason: 禁止“一包磺胺药解千愁”式的解决方式——药只是药，不是奇迹，换来的只是更多人能活到下一次战斗
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: 时间：1942年1月31日 — 2月28日，共29天，极寒冬季
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: 地点：虚构县城"通兰县"，由呼兰县、通河县、依兰县的原始背景融合构建
