layers:
  - id: L1
    name: hard_facts
    precedence: 100
    scope: global
  - id: L2
    name: author_intent
    precedence: 80
    scope: book
  - id: L3
    name: planning
    precedence: 60
    scope: arc
  - id: L4
    name: current_task
    precedence: 70
    scope: local
sections:
  hard:
    - story_frame
    - current_state
    - book_rules
    - roles
  soft:
    - author_intent
    - current_focus
    - volume_map
  diagnostic:
    - anti_ai_checks
    - continuity_audit
    - style_regression_checks
overrideEdges:
  - from: L4
    to: L3
    allowed: true
    scope: current_chapter
  - from: L4
    to: L2
    allowed: false
    scope: current_chapter
  - from: L4
    to: L1
    allowed: false
    scope: current_chapter
activeOverrides:
  - from: L4
    to: L3
    target: chapter:1/mustAvoid
    reason: 禁止程靖霖在任何危机中被“老天爷”或巧合或偶然的无名情报拯救
  - from: L4
    to: L3
    target: chapter:1/mustAvoid
    reason: 禁止山本武正在终局前被轻松杀死或调离——他的压迫感必须维持到最后
  - from: L4
    to: L3
    target: chapter:1/mustAvoid
    reason: 禁止任何全景空镜描写或过度景物抒情（通兰县的冬天有多冷、雪有多大，必须通过人物的动作和皮肤的感觉来写，不可以写“寒风刺骨”这种套话）
  - from: L4
    to: L3
    target: chapter:1/mustAvoid
    reason: 禁止用“内心独白直接坦白”的方式揭露后台伏笔——所有后台信息必须通过动作、对话、物件细节来间接释放
  - from: L4
    to: L3
    target: chapter:1/mustAvoid
    reason: 禁止任何角色在对话中说“你听我说”或“我告诉你一个秘密”这种直接交换信息的形式，信息必须通过观察、偷听、猜谜、散落纸条等方式传递
  - from: L4
    to: L3
    target: chapter:1/styleEmphasis
    reason: 题材：历史现实主义
  - from: L4
    to: L3
    target: chapter:1/styleEmphasis
    reason: 风格：白描与强叙事为主，高信息量
